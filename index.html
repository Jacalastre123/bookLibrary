<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Library</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1 id="greeting">Book Library</h1>

    <nav>
    <button id="settings">Settings</button>
    <button id="newBook">Add</button>
    </nav>
    </header>

    
 <div class="bar">
    <div id="Progress"></div>
    <h4 id="percentage">Goal: 0/100</h4>
 </div>

    <div id="container">
        
    
    </div>
       <dialog id="dial">
        
        <h3>Add Book</h3>
        <form>
            <label for="title">Title: </label>
            <input type="text" id="title" required><br>
            <label for="author">Author: </label>
             <input type="text" id="author" required><br>
             <video id="video" autoplay width="150"></video>
             <br>
                
                
        </form>
        <button type="submit" id="submit">Submit</button>
        <button id="closeDial1">Close</button>
    </dialog>
    <template id="tempHolds">
        <div class="holder">
        <button class="delete">Delete</button>
        <h2 id="titleHold"></h2>
        
        <p id="personHold"></p>

        <canvas id="picture" width="150" height="112.5"></canvas>
        <p id="date"></p>
        </div>
    </template>

    <dialog id="dial2">
        <h3>Customising Menu</h3>
        <form>
            <label for="name">Name: </label>
            <input type="text" id="name">
           <br>

            <label for="goals">Goal: </label>
            <input type="number" id="goals">
            <br>
             <label for="goals">Book Colour: </label>
            <input type="color" id="colour">
            <br>
        </form>
        <button id="dial2Close">Submit/Close</button>
        <button id="ResetCol"></button>
    </dialog>
    <dialog id="won">
        <h3>You passed your goal!</h3>
        <h5 id="read">You had read 100/100</h5>
        <button id="closeWon">Close</button>
    </dialog>
    <script src="
https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js
"></script>
<link href="
https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css
" rel="stylesheet">
    <script src="setUp.js"></script>
    <script src="clicking.js"></script>
    <script src="starter.js"></script>

</body>
</html>
